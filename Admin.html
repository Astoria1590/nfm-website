<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NFM Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0b3d91, #1e3a8a, #2563eb);
      color: #333;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin-bottom: 5px;
      color: #1e3a8a;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #162c6b;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1>Welcome to NFM Admin</h1>
    <p class="subtitle">Secure access to ministry data</p>

    <input type="password" id="password" placeholder="Enter Admin Password">

    <button onclick="login()">Login</button>

    <div class="error" id="errorMsg">Invalid password</div>

    <div class="footer">
      New Faith Ministries © 2026
    </div>
  </div>

  <script>
    function login() {
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      fetch("https://nfm-backend.onrender.com/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ password })
      })
      .then(res => {
        if (!res.ok) {
          throw new Error("Invalid");
        }
        return res.json();
      })
      .then(data => {
        localStorage.setItem("token", data.token);
        window.location.href = "Admin Home.html";
      })
      .catch(() => {
        errorMsg.style.display = "block";
      });
    }
  </script>

</body>
</html>
