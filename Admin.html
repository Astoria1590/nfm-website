<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - New Faith Ministries</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #1e3a8a;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const password = document.getElementById("password").value;

  fetch("https://nfm-backend.onrender.com/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password })
  })
  .then(res => {
    if (!res.ok) throw new Error("Wrong password");
    return res.json();
  })
  .then(data => {
    localStorage.setItem("token", data.token);
    window.location.href = "Dashboard.html";
  })
  .catch(() => alert("Invalid password"));
}
</script>

</body>
</html>
