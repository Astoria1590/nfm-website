<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Live | New Faith Ministries</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      background: #020617;
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: auto;
    }

    .logo img {
      height: 50px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    /* MOBILE MENU BUTTON */
    .menu-toggle {
      display: none;
      font-size: 28px;
      cursor: pointer;
    }

    /* WATCH LIVE CONTENT */
    .container {
      text-align: center;
      max-width: 900px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 40px;
    }

    .options {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 30px;
      flex: 1 1 250px;
      max-width: 350px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      color: white;
    }

    .facebook {
      background: #1877f2;
    }

    .youtube {
      background: #ff0000;
    }

    /* MOBILE STYLES */
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: #020617;
        flex-direction: column;
        align-items: center;
        display: none;
        padding: 20px 0;
      }

      .nav-links a {
        padding: 10px 0;
      }

      .nav-links.active {
        display: flex;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-container">

      <div class="logo">
        <img src="https://newfaithministriesorg.wordpress.com/wp-content/uploads/2026/04/new-faith.png" alt="Church Logo">
      </div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="watch-live.html">Watch Live</a>
        <a href="https://newfaithministries.churchcenter.com/giving">Give</a>
        <a href="About Us.html">About Us</a>
        <a href="Join Us.html">Join Us</a>
        <a href="Admin.html">Admin Login</a>
      </nav>

    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container">
    <h1>Watch Live</h1>
    <p>Join us live and be part of what God is doing. Choose your preferred platform below.</p>

    <div class="options">

      <div class="card">
        <h2>Facebook Live</h2>
        <p>Watch directly on Facebook</p>
        <a href="https://www.facebook.com/profile.php?id=100064617012630" target="_blank" class="btn facebook">
          Watch on Facebook
        </a>
      </div>

      <div class="card">
        <h2>YouTube Live</h2>
        <p>Watch on YouTube</p>
        <a href="https://www.youtube.com/@newfaithministries1137" target="_blank" class="btn youtube">
          Watch on YouTube
        </a>
      </div>

    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("navLinks").classList.toggle("active");
    }
  </script>

</body>
</html>
