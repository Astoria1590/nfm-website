<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }

    th {
      background: #1e3a8a;
      color: white;
    }
  </style>
</head>
<body>

<h2>Ministry Signups</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Ministry</th>
      <th>Message</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "admin.html";
}

fetch("https://nfm-backend.onrender.com/admin/signups", {
  headers: {
    "Authorization": token
  }
})
.then(res => res.json())
.then(data => {
  const table = document.getElementById("tableBody");

  data.forEach(item => {
    const row = `
      <tr>
        <td>${item.name}</td>
        <td>${item.email}</td>
        <td>${item.ministry}</td>
        <td>${item.message}</td>
        <td>${new Date(item.date).toLocaleString()}</td>
      </tr>
    `;
    table.innerHTML += row;
  });
});
</script>

</body>
</html>
